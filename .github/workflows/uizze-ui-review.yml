name: UIZZE UI review

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - ".uizze/**"
      - ".github/uizze-ui-evidence.json"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  finish-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - uses: samuelbushi/uizze-ui-slop-gate@d4797bac46fd5f96b60cc4d0c3d92fbca508e9ba # v1.0.2
        with:
          manifest: .github/uizze-ui-evidence.json
          fail-on: error
          show-uizze-link: "true"
